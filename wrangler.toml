name = "switchmessage-doc"
main = "worker/index.ts"
compatibility_date = "2026-05-01"
workers_dev = false

# Cloudflare account that hosts switchmessage.com — matches the sibling
# hub-message-api worker, so deploys go to the right tenant.
account_id = "c07309771abb829078a03ffe0565e692"

# Cloudflare Workers Builds (GitHub-connected auto-deploy) runs `wrangler
# deploy` directly, which would skip `astro build` and leave ./dist missing.
# This [build] command runs before deploy in that environment. Local `npm run
# deploy` already chains astro build && wrangler deploy, so this is a no-op
# there.
[build]
command = "npm install && npm run build"

# Astro Starlight builds static HTML/CSS/JS into ./dist. The Worker serves it
# via the ASSETS binding *after* the Basic Auth gate runs.
#
# run_worker_first = true is essential — without it the Worker would only run
# for requests that miss the asset directory, leaving everything else
# unauthenticated.
[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
# Serve dist/404.html (built from src/content/docs/404.md) with a 404 status
# whenever env.ASSETS.fetch can't match a request to a built file.
not_found_handling = "404-page"

# Bound to the docs subdomain. The switchmessage.com zone lives on the same
# Cloudflare account as the API worker, so custom_domain = true handles DNS
# provisioning automatically.
[[routes]]
pattern = "docs.switchmessage.com"
custom_domain = true

# DOCS_PASSWORD is provisioned out-of-band:
#   wrangler secret put DOCS_PASSWORD
# Do not commit the password to this file.
